version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: salesiq-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salesiq-redis-prod
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesiq-backend-prod
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesiq-celery-worker-prod
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=8

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesiq-celery-beat-prod
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=warning

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: salesiq-frontend-prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
